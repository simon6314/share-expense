<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>精靈 & 小狐狸 💛 共同帳本</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── 季節主題 ── */
:root {
  --bg: #f7f5f0; --surface: #fff; --surface2: #f0ede6; --border: #e2ddd5;
  --text: #1a1814; --text2: #6b6560; --text3: #9e9890;
  --elf: #2d7a5f; --elf-bg: #e8f5ef; --fox: #c45a2a; --fox-bg: #fdf0e8;
  --income: #2d7a5f; --expense: #c45a2a;
  --accent: #1a1814; --radius: 12px; --radius-sm: 8px;
  --season-emoji: "🌸"; --season-name: "春・櫻花季";
  --season-bg: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 50%, #ffeeff 100%);
  --season-particle: "🌸";
}
[data-season="spring"] {
  --bg: #fdf6f9; --surface: #fffafc; --surface2: #fce8f1; --border: #f0c9dd;
  --season-bg: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 50%, #ffeeff 100%);
}
[data-season="summer"] {
  --bg: #f0f9ff; --surface: #fafdff; --surface2: #e0f2fe; --border: #bae6fd;
  --income: #0369a1; --elf: #0369a1; --elf-bg: #e0f2fe;
  --season-bg: linear-gradient(135deg, #0ea5e9 0%, #38bdf8 50%, #7dd3fc 100%);
}
[data-season="autumn"] {
  --bg: #fdf8f3; --surface: #fffcf9; --surface2: #feefd7; --border: #fcd9a0;
  --income: #92400e; --elf: #92400e; --elf-bg: #fef3c7;
  --expense: #b91c1c; --fox: #b91c1c; --fox-bg: #fee2e2;
  --season-bg: linear-gradient(135deg, #f59e0b 0%, #ef4444 50%, #dc2626 100%);
}
[data-season="winter"] {
  --bg: #f5f8ff; --surface: #fafcff; --surface2: #e8eeff; --border: #c7d7f8;
  --income: #1e40af; --elf: #1e40af; --elf-bg: #dbeafe;
  --season-bg: linear-gradient(135deg, #93c5fd 0%, #a5b4fc 50%, #e0e7ff 100%);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; transition: background 0.5s, color 0.3s; }

/* ── PARTICLES ── */
.particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; overflow: hidden; }
.particle { position: absolute; top: -40px; font-size: 13px; opacity: 0; animation: fall linear infinite; }
@keyframes fall {
  0% { transform: translateY(0) rotate(0deg); opacity: 0; }
  10% { opacity: 0.35; }
  90% { opacity: 0.25; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

/* ── HEADER ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.5s, border-color 0.5s;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.season-badge {
  font-size: 10px; color: var(--text3); padding: 3px 8px;
  border: 1px solid var(--border); border-radius: 20px; cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
}
.season-badge:hover { border-color: var(--text2); color: var(--text2); }
.header-title { font-size: 15px; font-weight: 700; }
.header-sub { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; }
.header-right { display: flex; gap: 6px; align-items: center; }
.month-select {
  font-family: 'Noto Sans TC', sans-serif; font-size: 12px;
  padding: 6px 8px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text); cursor: pointer;
  max-width: 110px;
}
.btn-add {
  background: var(--text); color: #fff; border: none; border-radius: var(--radius-sm);
  padding: 7px 12px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif;
  font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 4px;
  white-space: nowrap; transition: opacity 0.15s;
}
.btn-add:hover { opacity: 0.8; }

/* ── SUMMARY ── */
.summary { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; padding: 12px 16px; position: relative; z-index: 1; }
@media (max-width: 600px) { .summary { grid-template-columns: repeat(2,1fr); gap: 8px; } }
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 14px; transition: background 0.5s, border-color 0.5s;
}
.card-label { font-size: 10px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
.card-value { font-size: 18px; font-weight: 700; font-family: 'DM Mono', monospace; letter-spacing: -0.02em; }
.card-value.income { color: var(--income); }
.card-value.expense { color: var(--expense); }

/* ── TABS ── */
.tabs {
  display: flex; gap: 2px; padding: 0 16px;
  border-bottom: 1px solid var(--border); background: var(--surface);
  overflow-x: auto; -webkit-overflow-scrolling: touch; position: relative; z-index: 1;
}
.tab {
  padding: 10px 14px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif;
  border: none; background: none; color: var(--text2); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap;
}
.tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }

/* ── CONTENT ── */
.content { padding: 12px 16px; max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }

/* ── TOOLBAR ── */
.toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.search-input {
  flex: 1; min-width: 140px; padding: 8px 12px; font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif; border: 1px solid var(--border);
  border-radius: var(--radius-sm); background: var(--surface); color: var(--text);
}
.search-input:focus { outline: none; border-color: var(--text2); }
.filter-select {
  padding: 8px 8px; font-size: 12px; font-family: 'Noto Sans TC', sans-serif;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text); cursor: pointer;
}

/* ── DESKTOP TABLE ── */
.table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; background: var(--surface); font-size: 13px; }
th { padding: 10px 12px; text-align: left; font-size: 10px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500; border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg); }

/* ── MOBILE CARDS ── */
.card-list { display: flex; flex-direction: column; gap: 8px; }
.record-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 14px; transition: background 0.5s, border-color 0.5s;
}
.record-card.summary-card { background: var(--surface2); }
.record-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.record-card-date { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
.record-card-amount { font-size: 16px; font-weight: 700; font-family: 'DM Mono', monospace; }
.record-card-mid { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.record-card-item { font-size: 14px; font-weight: 500; flex: 1; }
.record-card-note { font-size: 11px; color: var(--text3); }
.record-card-bottom { display: flex; justify-content: space-between; align-items: center; }
.transfer-row-mobile { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
.transfer-row-mobile input {
  width: 75px; padding: 5px 7px; font-size: 12px;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg); font-family: 'DM Mono', monospace;
}

/* ── BADGES ── */
.owner-badge { display: inline-flex; align-items: center; gap: 3px; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.badge-elf { background: var(--elf-bg); color: var(--elf); }
.badge-fox { background: var(--fox-bg); color: var(--fox); }
.amount-income { color: var(--income); font-weight: 600; font-family: 'DM Mono', monospace; font-size: 13px; }
.amount-expense { color: var(--expense); font-weight: 600; font-family: 'DM Mono', monospace; font-size: 13px; }
.delete-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; cursor: pointer; color: var(--text3); font-size: 12px; transition: all 0.15s; }
.delete-btn:hover { border-color: var(--expense); color: var(--expense); }
.note-text { color: var(--text3); font-size: 12px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }
.loading-state { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }
.spinner { width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 10px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── ANALYSIS ── */
.section-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
.chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
.chart-canvas-wrap { position: relative; height: 220px; }

/* ── MEMBERS ── */
.member-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
@media (max-width: 480px) { .member-grid { grid-template-columns: 1fr; } }
.member-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.member-name { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
.member-stat { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
.member-stat:last-child { border: none; }
.member-stat-label { color: var(--text2); }
.member-stat-value { font-family: 'DM Mono', monospace; font-weight: 500; font-size: 13px; }
.income-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

/* ── SYNC BAR ── */
.sync-bar { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text3); padding: 5px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); position: relative; z-index: 1; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
.sync-dot.ok { background: var(--income); }
.sync-dot.err { background: var(--expense); }
.sync-dot.loading { background: #f0a500; animation: pulse 1s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── MODAL ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: flex-end; justify-content: center; animation: fadeIn 0.15s ease; }
@media (min-width: 600px) { .overlay { align-items: center; padding: 20px; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal { background: var(--surface); width: 100%; max-width: 480px; border-radius: var(--radius) var(--radius) 0 0; padding: 22px 18px; animation: slideUp 0.2s ease; max-height: 90vh; overflow-y: auto; }
@media (min-width: 600px) { .modal { border-radius: var(--radius); } }
@keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-title { font-size: 15px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text2); padding: 0; line-height: 1; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 4px; letter-spacing: 0.04em; text-transform: uppercase; }
.field input, .field select, .field textarea { width: 100%; padding: 10px 12px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); transition: border-color 0.15s; }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--text); background: var(--surface); }
.field textarea { resize: vertical; min-height: 56px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.amount-toggle { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 12px; }
.toggle-btn { padding: 10px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; border: none; background: var(--bg); color: var(--text2); cursor: pointer; font-weight: 500; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.btn-cancel { padding: 10px 16px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text2); cursor: pointer; }
.btn-save { padding: 10px 18px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; font-weight: 600; border: none; border-radius: var(--radius-sm); background: var(--text); color: #fff; cursor: pointer; transition: opacity 0.15s; }
.btn-save:hover { opacity: 0.8; }
.btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── SEASON SELECTOR ── */
.season-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px; }
.season-panel { background: var(--surface); border-radius: var(--radius); padding: 20px; width: 100%; max-width: 320px; }
.season-panel h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
.season-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.season-opt { padding: 12px; border: 2px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; text-align: center; font-size: 13px; transition: all 0.15s; background: var(--bg); }
.season-opt:hover { border-color: var(--text2); }
.season-opt.selected { border-color: var(--text); background: var(--surface2); font-weight: 500; }
.season-opt .s-emoji { font-size: 24px; display: block; margin-bottom: 4px; }
.season-auto { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); cursor: pointer; margin-bottom: 8px; }
.season-auto.active { background: var(--surface2); border-color: var(--text2); font-weight: 500; }
.season-close { width: 100%; padding: 10px; border: none; border-radius: var(--radius-sm); font-size: 13px; font-family: 'Noto Sans TC', sans-serif; background: var(--text); color: #fff; cursor: pointer; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 13px; z-index: 999; animation: toastIn 0.2s ease; white-space: nowrap; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* ── RESPONSIVE ── */
.mobile-only { display: none; }
.desktop-only { display: block; }
@media (max-width: 640px) {
  .mobile-only { display: block; }
  .desktop-only { display: none; }
  .content { padding: 10px 12px; }
}
</style>
</head>
<body data-season="spring">

<div class="particles" id="particles"></div>

<div class="header">
  <div class="header-left">
    <div>
      <div class="header-title">精靈 &amp; 小狐狸 💛</div>
      <div class="header-sub">共同帳本</div>
    </div>
    <button class="season-badge" id="seasonBadge" onclick="openSeasonModal()">🌸 春・櫻花季</button>
  </div>
  <div class="header-right">
    <select class="month-select" id="monthSel" onchange="loadData()"><option>載入中…</option></select>
    <button class="btn-add" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新增
    </button>
  </div>
</div>

<div class="sync-bar">
  <div class="sync-dot" id="syncDot"></div>
  <span id="syncText">連接中…</span>
</div>

<div class="summary">
  <div class="card"><div class="card-label" id="s-income-label">本月收入</div><div class="card-value income" id="s-income">—</div></div>
  <div class="card"><div class="card-label" id="s-expense-label">本月支出</div><div class="card-value expense" id="s-expense">—</div></div>
  <div class="card"><div class="card-label">結餘</div><div class="card-value" id="s-balance">—</div></div>
  <div class="card"><div class="card-label">筆數</div><div class="card-value" id="s-count">—</div></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('records',this)">明細</button>
  <button class="tab" onclick="switchTab('analysis',this)">分析</button>
  <button class="tab" onclick="switchTab('members',this)">成員</button>
</div>

<!-- RECORDS TAB -->
<div id="tab-records" class="content">
  <div class="toolbar">
    <input class="search-input" id="searchBox" placeholder="搜尋項目或備註…" oninput="renderRecords()">
    <select class="filter-select" id="ownerFilter" onchange="renderRecords()">
      <option value="">全部</option>
      <option value="精靈">🧝 精靈</option>
      <option value="小狐狸">🦊 小狐狸</option>
    </select>
    <select class="filter-select" id="typeFilter" onchange="renderRecords()">
      <option value="">收支</option>
      <option value="income">收入</option>
      <option value="expense">支出</option>
    </select>
  </div>
  <!-- Desktop table -->
  <div class="table-wrap desktop-only">
    <table>
      <thead><tr><th>日期</th><th>擁有者</th><th>項目</th><th>金額</th><th>備註</th><th></th></tr></thead>
      <tbody id="recordBody"><tr><td colspan="6"><div class="loading-state"><div class="spinner"></div>載入中…</div></td></tr></tbody>
    </table>
  </div>
  <!-- Mobile cards -->
  <div class="card-list mobile-only" id="recordCards">
    <div class="loading-state"><div class="spinner"></div>載入中…</div>
  </div>
</div>

<!-- ANALYSIS TAB -->
<div id="tab-analysis" class="content" style="display:none">
  <p class="section-title">支出分類</p>
  <div class="chart-wrap"><div class="chart-canvas-wrap"><canvas id="catChart"></canvas></div></div>
  <p class="section-title">每日累計支出</p>
  <div class="chart-wrap"><div class="chart-canvas-wrap"><canvas id="dailyChart"></canvas></div></div>
</div>

<!-- MEMBERS TAB -->
<div id="tab-members" class="content" style="display:none">
  <p class="section-title">成員支出狀況</p>
  <div class="member-grid" id="memberGrid"></div>
  <p class="section-title">進帳比例設定</p>
  <div class="income-table-wrap">
    <table>
      <thead><tr><th>成員</th><th>年收入</th><th>計算方式</th><th>每月預期進帳</th></tr></thead>
      <tbody>
        <tr><td><span class="owner-badge badge-elf">🧝 精靈</span></td><td style="font-family:'DM Mono',monospace">$1,250,000</td><td style="color:var(--text3);font-size:12px">15%÷14月</td><td class="amount-income">+$13,393</td></tr>
        <tr><td><span class="owner-badge badge-fox">🦊 小狐狸</span></td><td style="font-family:'DM Mono',monospace">$700,000</td><td style="color:var(--text3);font-size:12px">15%÷14月</td><td class="amount-income">+$7,500</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="overlayContainer"></div>
<div id="seasonModalContainer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const API = 'https://script.google.com/macros/s/AKfycbzdnp_gvKGGELnzDA4ZNq25RQ3mPPOXqbuwINKUBXuobbBw_cLubt8Cn-oDrazLfgkk/exec';
let records = [];
let catChartInst = null, dailyChartInst = null;
let amountType = 'expense';
let manualSeason = null;

// ── 季節 ──────────────────────────────────────────────────────
const SEASONS = {
  spring: { name: '春・櫻花季', emoji: '🌸', months: [3,4,5], particles: ['🌸','🌺','🌷'] },
  summer: { name: '夏・晴空季', emoji: '☀️', months: [6,7,8], particles: ['🌊','🌻','⭐'] },
  autumn: { name: '秋・楓葉季', emoji: '🍁', months: [9,10,11], particles: ['🍁','🍂','🌰'] },
  winter: { name: '冬・雪季',   emoji: '❄️', months: [12,1,2], particles: ['❄️','⛄','✨'] }
};

function getAutoSeason() {
  const m = new Date().getMonth() + 1;
  for (const [key, s] of Object.entries(SEASONS)) {
    if (s.months.includes(m)) return key;
  }
  return 'spring';
}

function applySeason(key) {
  document.body.setAttribute('data-season', key);
  const s = SEASONS[key];
  document.getElementById('seasonBadge').textContent = s.emoji + ' ' + s.name;
  spawnParticles(s.particles);
}

function spawnParticles(emojis) {
  const container = document.getElementById('particles');
  container.innerHTML = '';
  const count = 18;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emojis[i % emojis.length];
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (6 + Math.random() * 8) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.fontSize = (12 + Math.random() * 10) + 'px';
    container.appendChild(p);
  }
}

function openSeasonModal() {
  const cur = manualSeason || getAutoSeason();
  const isAuto = !manualSeason;
  document.getElementById('seasonModalContainer').innerHTML = `
    <div class="season-modal" onclick="if(event.target===this)closeSeasonModal()">
      <div class="season-panel">
        <h3>🎨 選擇季節主題</h3>
        <button class="season-auto ${isAuto ? 'active' : ''}" onclick="setAutoSeason()">✨ 自動（依當前月份）</button>
        <div class="season-options">
          ${Object.entries(SEASONS).map(([k,s]) => `
            <div class="season-opt ${!isAuto && cur===k ? 'selected' : ''}" onclick="setManualSeason('${k}')">
              <span class="s-emoji">${s.emoji}</span>${s.name}
            </div>`).join('')}
        </div>
        <button class="season-close" onclick="closeSeasonModal()">完成</button>
      </div>
    </div>`;
}

function closeSeasonModal() { document.getElementById('seasonModalContainer').innerHTML = ''; }

function setAutoSeason() {
  manualSeason = null;
  applySeason(getAutoSeason());
  document.querySelectorAll('.season-opt').forEach(e => e.classList.remove('selected'));
  document.querySelector('.season-auto').classList.add('active');
}

function setManualSeason(key) {
  manualSeason = key;
  applySeason(key);
  document.querySelectorAll('.season-opt').forEach(e => e.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  document.querySelector('.season-auto').classList.remove('active');
}

// ── API ───────────────────────────────────────────────────────
async function apiCall(params) {
  const qs = Object.entries(params)
    .map(([k,v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v)).join('&');
  const res = await fetch(API + '?' + qs);
  return res.json();
}

function setSyncStatus(state, text) {
  document.getElementById('syncDot').className = 'sync-dot ' + state;
  document.getElementById('syncText').textContent = text;
}

function currentSheet() { return document.getElementById('monthSel').value; }

async function loadData() {
  setSyncStatus('loading', '同步中…');
  const loadHTML = '<div class="loading-state"><div class="spinner"></div>載入中…</div>';
  document.getElementById('recordBody').innerHTML = '<tr><td colspan="6">' + loadHTML + '</td></tr>';
  document.getElementById('recordCards').innerHTML = loadHTML;
  try {
    const data = await apiCall({ action: 'getAll', sheet: currentSheet() });
    if (data.error) throw new Error(data.error);
    records = data.records || [];
    setSyncStatus('ok', '已同步 · ' + new Date().toLocaleTimeString('zh-TW'));
    renderAll();
  } catch(e) {
    setSyncStatus('err', '連線失敗');
    const errHTML = '<div class="empty-state">⚠️ 無法連線到 Google 試算表</div>';
    document.getElementById('recordBody').innerHTML = '<tr><td colspan="6">' + errHTML + '</td></tr>';
    document.getElementById('recordCards').innerHTML = errHTML;
  }
}

async function addRecord(data) {
  setSyncStatus('loading', '儲存中…');
  try {
    const summaryRow = records.find(r => r.item && r.item.includes('總收入/支出'));
    const beforeRow = summaryRow ? summaryRow.row : null;
    await apiCall({ action: 'add', sheet: currentSheet(), data: JSON.stringify(data), beforeRow: beforeRow || '' });
    showToast('已新增 ✓');
    await loadData();
  } catch(e) {
    setSyncStatus('err', '儲存失敗');
    showToast('儲存失敗，請重試');
  }
}

async function updateTransfer(row, field, value) {
  setSyncStatus('loading', '更新中…');
  const rec = records.find(r => r.row === row);
  if (rec) {
    if (field === 'income') rec.income = parseFloat(value) || 0;
    else rec.expense = parseFloat(value) || 0;
    const result = rec.income - rec.expense;
    ['transfer-result-' + row, 'transfer-result-m-' + row].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.textContent = (result >= 0 ? '+' : '') + result.toLocaleString(); el.style.color = result >= 0 ? 'var(--income)' : 'var(--expense)'; }
    });
    if (rec.item && rec.item.includes('精靈')) {
      const foxRec = records.find(r => r.item && r.item.includes('支出部分轉回') && r.item.includes('小狐狸'));
      if (foxRec) {
        foxRec.income = result;
        ['[data-row="'+foxRec.row+'"][data-field="income"]'].forEach(sel => {
          document.querySelectorAll(sel).forEach(inp => { inp.value = result; });
        });
        const foxResult = foxRec.income - foxRec.expense;
        ['transfer-result-' + foxRec.row, 'transfer-result-m-' + foxRec.row].forEach(id => {
          const el = document.getElementById(id);
          if (el) { el.textContent = (foxResult >= 0 ? '+' : '') + foxResult.toLocaleString(); el.style.color = foxResult >= 0 ? 'var(--income)' : 'var(--expense)'; }
        });
        await apiCall({ action: 'updateTransfer', sheet: currentSheet(), row: foxRec.row, field: 'income', value: result });
      }
    }
  }
  try {
    await apiCall({ action: 'updateTransfer', sheet: currentSheet(), row, field, value: parseFloat(value) || 0 });
    setSyncStatus('ok', '已同步 · ' + new Date().toLocaleTimeString('zh-TW'));
    showToast('已更新 ✓');
  } catch(e) {
    setSyncStatus('err', '更新失敗');
    showToast('更新失敗，請重試');
  }
}

async function deleteRecord(row) {
  if (!confirm('確定刪除這筆記錄？')) return;
  setSyncStatus('loading', '刪除中…');
  try {
    await apiCall({ action: 'delete', sheet: currentSheet(), row });
    showToast('已刪除');
    await loadData();
  } catch(e) { setSyncStatus('err', '刪除失敗'); }
}

// ── RENDER ────────────────────────────────────────────────────
function fmt(n) { return '$' + Math.round(n).toLocaleString(); }
const DAY_NAMES = ['日','一','二','三','四','五','六'];
function formatDate(raw) {
  if (!raw) return '';
  const d = new Date(raw);
  if (isNaN(d.getTime())) return String(raw);
  return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0') + ' (' + DAY_NAMES[d.getDay()] + ')';
}
function formatDateShort(raw) {
  if (!raw) return '';
  const d = new Date(raw);
  if (isNaN(d.getTime())) return String(raw);
  return String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0') + ' (' + DAY_NAMES[d.getDay()] + ')';
}

const SUMMARY_ITEMS = ['總收入/支出','帳戶餘額','支出部分轉回'];
const isSummaryRow = r => SUMMARY_ITEMS.some(k => r.item.includes(k)) || r.owner === '帳戶餘額';

function renderAll() {
  const realRecs = records.filter(r => !isSummaryRow(r));
  const isPrepaid = r => r.note && r.note.includes('先付');
  const totalIncome = realRecs.filter(r => r.owner !== '').reduce((s,r) => s + r.income, 0);
  const totalExpense = realRecs.filter(r => !isPrepaid(r)).reduce((s,r) => s + r.expense, 0);
  const balance = totalIncome - totalExpense;
  const sel = document.getElementById('monthSel');
  const monthLabel = sel.options[sel.selectedIndex]?.text || '';
  document.getElementById('s-income-label').textContent = monthLabel + ' 收入';
  document.getElementById('s-expense-label').textContent = monthLabel + ' 支出';
  document.getElementById('s-income').textContent = fmt(totalIncome);
  document.getElementById('s-expense').textContent = fmt(totalExpense);
  const balEl = document.getElementById('s-balance');
  balEl.textContent = fmt(balance);
  balEl.style.color = balance >= 0 ? 'var(--income)' : 'var(--expense)';
  document.getElementById('s-count').textContent = realRecs.length + ' 筆';
  renderRecords();
  if (document.getElementById('tab-analysis').style.display !== 'none') renderCharts();
  if (document.getElementById('tab-members').style.display !== 'none') renderMembers();
}

function getFiltered() {
  const q = (document.getElementById('searchBox')?.value || '').toLowerCase();
  const o = document.getElementById('ownerFilter')?.value || '';
  const t = document.getElementById('typeFilter')?.value || '';
  return records.filter(r => {
    if (q && !r.item.toLowerCase().includes(q) && !(r.note||'').toLowerCase().includes(q)) return false;
    if (o && r.owner !== o) return false;
    if (t === 'income' && r.income === 0) return false;
    if (t === 'expense' && r.expense === 0) return false;
    return true;
  });
}

function buildTransferCells(r, isMobile) {
  const incVal = r.income || 0, expVal = r.expense || 0;
  const result = incVal - expVal;
  const resColor = result >= 0 ? 'var(--income)' : 'var(--expense)';
  const prefix = isMobile ? 'm-' : '';
  const inputStyle = `width:75px;padding:${isMobile?'5px 7px':'4px 6px'};font-size:12px;border:1px solid var(--border);border-radius:6px;background:var(--bg);font-family:'DM Mono',monospace;`;
  return `<div class="${isMobile ? 'transfer-row-mobile' : ''}" style="${isMobile?'':'display:flex;gap:4px;align-items:center;flex-wrap:wrap'}">
    <span style="font-size:11px;color:var(--text3)">餘</span>
    <input type="number" value="${incVal||''}" min="0" placeholder="0"
      data-row="${r.row}" data-field="income"
      style="${inputStyle}color:var(--income);"
      onchange="updateTransfer(${r.row},'income',this.value)">
    <span style="font-size:11px;color:var(--text3)">轉</span>
    <input type="number" value="${expVal||''}" min="0" placeholder="0"
      data-row="${r.row}" data-field="expense"
      style="${inputStyle}color:var(--expense);"
      onchange="updateTransfer(${r.row},'expense',this.value)">
    <span style="font-size:11px;color:var(--text3)">=</span>
    <span id="transfer-result-${prefix}${r.row}" style="font-family:'DM Mono',monospace;font-size:13px;font-weight:600;color:${resColor}">${result>=0?'+':''}${result.toLocaleString()}</span>
  </div>`;
}

function renderRecords() {
  const rows = getFiltered();
  // Desktop
  const body = document.getElementById('recordBody');
  if (!rows.length) {
    body.innerHTML = '<tr><td colspan="6"><div class="empty-state">沒有符合的記錄</div></td></tr>';

  body.innerHTML = rows.map(r => {
    const isSummary = isSummaryRow(r);

    const badge = r.owner && !isSummary
      ? `<span class="owner-badge ${r.owner==='精靈'?'badge-elf':'badge-fox'}">${r.owner==='精靈'?'🧝':'🦊'} ${r.owner}</span>`
      : (isTransfer ? `<span class="owner-badge ${r.item.includes('精靈')?'badge-elf':'badge-fox'}">${r.item.includes('精靈')?'🧝 精靈':'🦊 小狐狸'}</span>` : '<span style="color:var(--text3);font-size:12px">—</span>');

    if (isTransfer) {
      return `<tr style="background:var(--surface2)">
        <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);white-space:nowrap">${formatDate(r.date)}</td>
        <td>${badge}</td>
        <td style="font-size:13px;font-weight:500">${r.item}</td>
        <td>${buildTransferCells(r, false)}</td>
        <td><span class="note-text">${r.note||''}</span></td>

    }
    if (isSummary) {
      const incAmt = r.income > 0 ? `<span class="amount-income">+${fmt(r.income)}</span>` : '';
      const expAmt = r.expense > 0 ? `<span class="amount-expense"> -${fmt(r.expense)}</span>` : '';

      return `<tr style="background:var(--surface2)">
        <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);white-space:nowrap">${formatDate(r.date)}</td>
        <td><span style="font-size:11px;color:var(--text3);font-weight:500">彙總</span></td>
        <td style="font-size:13px;font-weight:500">${r.item}</td>
        <td>${incAmt}${expAmt}${netAmt}</td>
        <td><span class="note-text">${r.note||''}</span></td>
        <td></td></tr>`;
    }
    const isPrepaid = r.note && r.note.includes('先付');
    const amt = r.income > 0
      ? `<span class="amount-income">+${fmt(r.income)}</span>`

      : '';
    return `<tr>
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);white-space:nowrap">${formatDate(r.date)}</td>
      <td>${badge}</td>
      <td style="font-size:13px">${r.item}</td>
      <td>${amt}</td>
      <td><span class="note-text">${r.note||''}</span></td>
      <td><button class="delete-btn" onclick="deleteRecord(${r.row})">✕</button></td></tr>`;
  }).join('');

  // ── Mobile cards ──
  document.getElementById('recordCards').innerHTML = rows.map(r => {
    const isSummary = isSummaryRow(r);
    const isTransfer = r.item.includes('支出部分轉回');
    const isPrepaid = r.note && r.note.includes('先付');

    const badgeHtml = ownerWho
      ? `<span class="owner-badge ${ownerWho==='精靈'?'badge-elf':'badge-fox'}">${ownerWho==='精靈'?'🧝':'🦊'} ${ownerWho}</span>`
      : '';

    if (isTransfer) {
      return `<div class="record-card summary-card">
        <div class="record-card-top">
          <span class="record-card-date">${formatDateShort(r.date)}</span>
          ${badgeHtml}
        </div>
        <div class="record-card-item">${r.item}</div>
        ${buildTransferCells(r, true)}
      </div>`;
    }

    if (isSummary) {
      const incAmt = r.income > 0 ? `<span class="amount-income">+${fmt(r.income)}</span> ` : '';
      const expAmt = r.expense > 0 ? `<span class="amount-expense">-${fmt(r.expense)}</span> ` : '';
      const net = r.income > 0 && r.expense > 0 ? `<span style="color:var(--text2);font-size:12px">= ${fmt(r.income-r.expense)}</span>` : '';
      return `<div class="record-card summary-card">
        <div class="record-card-top">
          <span class="record-card-date">${formatDateShort(r.date)}</span>

    </div>`;
  }).join('');
}

function categorize(item) {
  if (/全聯|超市|買菜/.test(item)) return '超市採購';
  if (/7-11|便利/.test(item)) return '便利商店';
  if (/自強號|火車|高鐵|交通|客運|Uber/.test(item)) return '交通';
  if (/珍煮丹|飲料|手搖|茶/.test(item)) return '飲料';
  if (/房租/.test(item)) return '房租';
  if (/每月的愛/.test(item)) return '固定轉帳';
  if (/momo|蝦皮|網購/.test(item)) return '網購';
  return '餐飲';
}

function renderCharts() {
  const expRecs = records.filter(r => r.expense > 0 && r.owner !== '' && !isSummaryRow(r));
  const catMap = {};
  expRecs.forEach(r => { const c = categorize(r.item); catMap[c] = (catMap[c]||0) + r.expense; });
  const cats = Object.keys(catMap).sort((a,b) => catMap[b]-catMap[a]);
  const palette = ['#2d7a5f','#c45a2a','#378ADD','#BA7517','#534AB7','#D4537E','#639922','#888780'];
  if (catChartInst) catChartInst.destroy();
  catChartInst = new Chart(document.getElementById('catChart'), {
    type: 'bar',
    data: { labels: cats, datasets: [{ data: cats.map(c=>catMap[c]), backgroundColor: palette.slice(0,cats.length), borderRadius: 6 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{ticks:{autoSkip:false,font:{family:'Noto Sans TC',size:11}}}, y:{ticks:{callback:v=>'$'+v.toLocaleString(),font:{family:'DM Mono',size:11}}} } }
  });
  const dailyMap = {};
  expRecs.forEach(r => { dailyMap[r.date]=(dailyMap[r.date]||0)+r.expense; });
  const days = Object.keys(dailyMap).sort();
  let cum = 0;
  const cumVals = days.map(d => { cum += dailyMap[d]; return cum; });
  if (dailyChartInst) dailyChartInst.destroy();
  dailyChartInst = new Chart(document.getElementById('dailyChart'), {
    type: 'line',
    data: { labels: days, datasets: [{ data: cumVals, borderColor: '#c45a2a', backgroundColor: 'rgba(196,90,42,0.08)', fill:true, tension:0.35, pointRadius:4, pointBackgroundColor:'#c45a2a' }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{ticks:{font:{family:'DM Mono',size:11}}}, y:{ticks:{callback:v=>'$'+v.toLocaleString(),font:{family:'DM Mono',size:11}}} } }
  });
}

async function submitRecord() {
  const date = document.getElementById('f-date').value.trim();
  const owner = document.getElementById('f-owner').value;
  const item = document.getElementById('f-item').value.trim();
  const amount = parseFloat(document.getElementById('f-amount').value)||0;
  const note = document.getElementById('f-note').value.trim();
  if (!date||!item||amount<=0) { showToast('請填寫日期、項目和金額'); return; }
  const btn = document.getElementById('saveBtn');
  btn.disabled=true; btn.textContent='儲存中…';
  await addRecord({ date, owner, item, income: amountType==='income'?amount:0, expense: amountType==='expense'?amount:0, note });
  closeModal();
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2200);
}

function sheetNameToLabel(name) {
  const m = name.match(/(\d{4})\/(\d{1,2})月/);
  if (!m) return name;
  return m[1] + ' 年 ' + m[2] + ' 月';
}

async function initSheets() {
  try {
    const data = await apiCall({ action: 'getSheets' });
    const sheets = data.sheets || [];
    const sel = document.getElementById('monthSel');
    sheets.sort((a,b) => {
      const ma=a.match(/(\d{4})\/(\d{1,2})月/), mb=b.match(/(\d{4})\/(\d{1,2})月/);
      if(!ma||!mb) return 0;
      return (parseInt(mb[1])*100+parseInt(mb[2])) - (parseInt(ma[1])*100+parseInt(ma[2]));
    });
    sel.innerHTML = sheets.map(s=>`<option value="${s}">${sheetNameToLabel(s)}</option>`).join('');
    const now = new Date();
    const curSheet = sheets.find(s => { const m=s.match(/(\d{4})\/(\d{1,2})月/); return m&&parseInt(m[1])===now.getFullYear()&&parseInt(m[2])===now.getMonth()+1; });
    if (curSheet) sel.value=curSheet;
    else if (sheets.length>0) sel.value=sheets[0];
  } catch(e) { console.error('無法載入工作表清單',e); }
  await loadData();
}

// ── INIT ─────────────────────────────────────────────────────
applySeason(getAutoSeason());
initSheets();
</script>
